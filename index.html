<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DecksRoyale</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b1d3a;
    color: white;
}

header {
    background: #1464f4;
    padding: 25px;
    text-align: center;
    font-size: 32px;
    font-weight: bold;
}

.container {
    padding: 20px;
}

.card {
    background: #163b70;
    padding: 20px;
    border-radius: 15px;
    margin-bottom: 20px;
}

.deck {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.card-item {
    background: #222;
    padding: 10px;
    border-radius: 10px;
}

button {
    background: gold;
    border: none;
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: bold;
}
</style>

</head>

<body>

<header>
👑 DecksRoyale
</header>

<div class="container">

<div class="card">
<h2>🔥 Meta Desteler</h2>
<p>En güçlü Clash Royale deste önerilerini keşfet.</p>
</div>

<div class="card">

<h2>🏆 Hog Cycle</h2>

<div class="deck">
<div class="card-item">🐷 Domuz Binicisi</div>
<div class="card-item">🏰 Top</div>
<div class="card-item">❄️ Buz Ruhu</div>
<div class="card-item">💀 İskeletler</div>
<div class="card-item">🪵 Kütük</div>
<div class="card-item">🎯 Silahşör</div>
<div class="card-item">🧊 Buz Golemi</div>
<div class="card-item">🌎 Deprem</div>
</div>

<br>

<button>Desteyi Gör</button>

</div>


<div class="card">
<h2>⭐ Yakında</h2>
<p>Favoriler, arama sistemi ve daha fazla deste eklenecek.</p>
</div>

</div>

</body>
</html>
