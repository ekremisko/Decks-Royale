<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kraliçe Domuzcuk - DecksRoyale</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
}
header{
    background:#2563eb;
    padding:20px;
    text-align:center;
}
.container{
    max-width:800px;
    margin:auto;
    padding:20px;
}
.card{
    background:#1e293b;
    border-radius:12px;
    padding:20px;
    margin-top:20px;
}
.deck{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
    margin-top:15px;
}
.card-item{
    background:#334155;
    padding:12px;
    border-radius:8px;
    text-align:center;
}
button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2563eb;
    color:white;
    font-size:18px;
    cursor:pointer;
}
a{
    text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>👑 Kraliçe Domuzcuk</h1>
</header>

<div class="container">

<div class="card">

<h2>Deste</h2>

<div class="deck">
<div class="card-item">🏹 Okçular Kraliçesi</div>
<div class="card-item">🐷 Domuz Binicisi</div>
<div class="card-item">🌎 Deprem</div>
<div class="card-item">🪵 Kütük</div>
<div class="card-item">🏰 Top</div>
<div class="card-item">💀 İskeletler</div>
<div class="card-item">🧊 Buz Ruhu</div>
<div class="card-item">🛡️ Şövalye</div>
</div>

<p><b>Ortalama İksir:</b> 3.0</p>

<p>
Bu deste hızlı döngüye dayanır. Domuz Binicisi ve Deprem ile kulelere baskı kurarken,
Okçular Kraliçesi güçlü savunma ve karşı atak imkânı sağlar.
</p>

<a href="index.html">
<button>⬅ Ana Sayfaya Dön</button>
</a>

</div>

</div>

</body>
</html>
